<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Countdown 倒數計時器</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #0f172a;
        --surface: #1e293b;
        --border: #334155;
        --text: #f1f5f9;
        --muted: #94a3b8;
        --accent: #38bdf8;
        --green: #4ade80;
        --yellow: #facc15;
        --orange: #fb923c;
        --red: #f87171;
      }

      body {
        font-family: "Segoe UI", system-ui, sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 2rem;
        padding: 2rem;
      }

      h1 {
        font-size: 1.25rem;
        font-weight: 600;
        letter-spacing: 0.15em;
        color: var(--muted);
        text-transform: uppercase;
      }

      /* ── 倒數顯示 ── */
      .timer-ring {
        position: relative;
        width: 320px;
        height: 320px;
      }

      .timer-ring svg {
        transform: rotate(-90deg);
      }

      .ring-bg {
        fill: none;
        stroke: var(--surface);
        stroke-width: 12;
      }

      .ring-progress {
        fill: none;
        stroke: var(--green);
        stroke-width: 12;
        stroke-linecap: round;
        transition:
          stroke-dashoffset 0.5s linear,
          stroke 0.5s ease;
      }

      .timer-label {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 0.25rem;
      }

      .timer-display {
        font-size: 5rem;
        font-weight: 700;
        font-variant-numeric: tabular-nums;
        letter-spacing: -0.02em;
        line-height: 1;
        transition: color 0.5s;
      }

      .timer-status {
        font-size: 0.85rem;
        color: var(--muted);
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }

      /* ── 設定面板 ── */
      .setup-panel {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1rem;
        width: 100%;
        max-width: 380px;
      }

      .time-inputs {
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }

      .time-inputs label {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.25rem;
        font-size: 0.75rem;
        color: var(--muted);
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .time-inputs input[type="number"] {
        width: 80px;
        padding: 0.6rem 0.5rem;
        font-size: 1.75rem;
        font-weight: 700;
        font-variant-numeric: tabular-nums;
        text-align: center;
        background: var(--surface);
        color: var(--text);
        border: 2px solid var(--border);
        border-radius: 10px;
        outline: none;
        appearance: textfield;
        -moz-appearance: textfield;
      }

      .time-inputs input[type="number"]:focus {
        border-color: var(--accent);
      }

      .time-inputs input::-webkit-inner-spin-button,
      .time-inputs input::-webkit-outer-spin-button {
        -webkit-appearance: none;
      }

      .sep {
        font-size: 2rem;
        font-weight: 700;
        color: var(--muted);
        margin-bottom: 1.25rem;
      }

      /* ── 快速預設 ── */
      .presets {
        display: flex;
        gap: 0.5rem;
        flex-wrap: wrap;
        justify-content: center;
      }

      .preset-btn {
        padding: 0.35rem 0.9rem;
        border-radius: 999px;
        border: 1px solid var(--border);
        background: transparent;
        color: var(--muted);
        font-size: 0.8rem;
        cursor: pointer;
        transition: all 0.15s;
      }

      .preset-btn:hover {
        border-color: var(--accent);
        color: var(--accent);
      }

      /* ── 控制按鈕 ── */
      .controls {
        display: flex;
        gap: 0.75rem;
      }

      button.ctrl {
        padding: 0.75rem 2rem;
        border-radius: 10px;
        border: none;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition:
          transform 0.1s,
          opacity 0.15s;
      }

      button.ctrl:active {
        transform: scale(0.96);
      }
      button.ctrl:disabled {
        opacity: 0.35;
        cursor: not-allowed;
      }

      .btn-start {
        background: var(--green);
        color: #0f172a;
      }
      .btn-pause {
        background: var(--yellow);
        color: #0f172a;
      }
      .btn-reset {
        background: var(--surface);
        color: var(--text);
        border: 1px solid var(--border);
      }

      /* ── 時間到 overlay ── */
      .done-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(248, 113, 113, 0.15);
        backdrop-filter: blur(4px);
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 1.5rem;
        z-index: 10;
        animation: flash 0.6s ease infinite alternate;
      }

      .done-overlay.visible {
        display: flex;
      }

      @keyframes flash {
        from {
          background: rgba(248, 113, 113, 0.1);
        }
        to {
          background: rgba(248, 113, 113, 0.3);
        }
      }

      .done-msg {
        font-size: 3.5rem;
        font-weight: 800;
        color: var(--red);
        text-align: center;
        text-shadow: 0 0 40px rgba(248, 113, 113, 0.6);
      }

      .done-sub {
        color: var(--text);
        font-size: 1.1rem;
      }

      .btn-dismiss {
        padding: 0.75rem 2.5rem;
        border-radius: 10px;
        background: var(--red);
        color: #fff;
        border: none;
        font-size: 1rem;
        font-weight: 700;
        cursor: pointer;
      }

      /* ── 狀態色彩 ── */
      body.state-warning .ring-progress {
        stroke: var(--yellow);
      }
      body.state-danger .ring-progress {
        stroke: var(--orange);
      }
      body.state-critical .ring-progress {
        stroke: var(--red);
      }

      body.state-warning .timer-display {
        color: var(--yellow);
      }
      body.state-danger .timer-display {
        color: var(--orange);
      }
      body.state-critical .timer-display {
        color: var(--red);
      }
    </style>
  </head>
  <body>
    <h1>Countdown 倒數計時器</h1>

    <!-- 圓形倒數 -->
    <div class="timer-ring">
      <svg width="320" height="320" viewBox="0 0 320 320">
        <circle class="ring-bg" cx="160" cy="160" r="148" />
        <circle
          class="ring-progress"
          id="ringProgress"
          cx="160"
          cy="160"
          r="148"
        />
      </svg>
      <div class="timer-label">
        <div class="timer-display" id="display">00:00</div>
        <div class="timer-status" id="status">準備開始</div>
      </div>
    </div>

    <!-- 設定 -->
    <div class="setup-panel">
      <div class="time-inputs">
        <label>
          分鐘
          <input type="number" id="inputMin" min="0" max="99" value="5" />
        </label>
        <span class="sep">:</span>
        <label>
          秒鐘
          <input type="number" id="inputSec" min="0" max="59" value="0" />
        </label>
      </div>

      <div class="presets">
        <button class="preset-btn" data-min="1" data-sec="0">1 分</button>
        <button class="preset-btn" data-min="3" data-sec="0">3 分</button>
        <button class="preset-btn" data-min="5" data-sec="0">5 分</button>
        <button class="preset-btn" data-min="10" data-sec="0">10 分</button>
        <button class="preset-btn" data-min="15" data-sec="0">15 分</button>
        <button class="preset-btn" data-min="25" data-sec="0">25 分</button>
        <button class="preset-btn" data-min="30" data-sec="0">30 分</button>
      </div>

      <div class="controls">
        <button class="ctrl btn-start" id="btnStart">開始</button>
        <button class="ctrl btn-pause" id="btnPause" disabled>暫停</button>
        <button class="ctrl btn-reset" id="btnReset">重設</button>
      </div>
    </div>

    <!-- 時間到 -->
    <div class="done-overlay" id="doneOverlay">
      <div class="done-msg">時間到！</div>
      <div class="done-sub">請注意，時間已結束</div>
      <button class="btn-dismiss" id="btnDismiss">關閉</button>
    </div>

    <script>
      const displayEl = document.getElementById("display");
      const statusEl = document.getElementById("status");
      const ringEl = document.getElementById("ringProgress");
      const inputMin = document.getElementById("inputMin");
      const inputSec = document.getElementById("inputSec");
      const btnStart = document.getElementById("btnStart");
      const btnPause = document.getElementById("btnPause");
      const btnReset = document.getElementById("btnReset");
      const doneOverlay = document.getElementById("doneOverlay");
      const btnDismiss = document.getElementById("btnDismiss");

      const CIRCUMFERENCE = 2 * Math.PI * 148; // r=148
      ringEl.style.strokeDasharray = CIRCUMFERENCE;
      ringEl.style.strokeDashoffset = 0;

      let totalSeconds = 0;
      let remaining = 0;
      let intervalId = null;
      let running = false;
      let audioCtx = null;

      function getAudioCtx() {
        if (!audioCtx)
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        return audioCtx;
      }

      function playBeep(freq = 880, duration = 0.3, delay = 0) {
        const ctx = getAudioCtx();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.frequency.value = freq;
        osc.type = "sine";
        const t = ctx.currentTime + delay;
        gain.gain.setValueAtTime(0.001, t);
        gain.gain.exponentialRampToValueAtTime(0.5, t + 0.01);
        gain.gain.exponentialRampToValueAtTime(0.001, t + duration);
        osc.start(t);
        osc.stop(t + duration + 0.05);
      }

      function playDoneSound() {
        // 三連音提示
        [0, 0.4, 0.8].forEach((d, i) => {
          const freqs = [660, 880, 1100];
          playBeep(freqs[i], 0.35, d);
        });
        // 長音
        playBeep(1100, 1.5, 1.3);
      }

      function playTickWarning() {
        playBeep(440, 0.05);
      }

      function fmt(s) {
        const m = Math.floor(s / 60);
        const sec = s % 60;
        return `${String(m).padStart(2, "0")}:${String(sec).padStart(2, "0")}`;
      }

      function setRing(ratio) {
        const offset = CIRCUMFERENCE * (1 - Math.max(0, Math.min(1, ratio)));
        ringEl.style.strokeDashoffset = offset;
      }

      function updateState() {
        document.body.classList.remove(
          "state-warning",
          "state-danger",
          "state-critical",
        );
        if (totalSeconds === 0) return;
        const ratio = remaining / totalSeconds;
        if (ratio <= 0.1) document.body.classList.add("state-critical");
        else if (ratio <= 0.25) document.body.classList.add("state-danger");
        else if (ratio <= 0.5) document.body.classList.add("state-warning");
      }

      function tick() {
        remaining--;

        if (remaining <= 10 && remaining > 0) playTickWarning();

        displayEl.textContent = fmt(remaining);
        setRing(remaining / totalSeconds);
        updateState();

        if (remaining <= 0) {
          clearInterval(intervalId);
          running = false;
          statusEl.textContent = "時間到！";
          setRing(0);
          btnStart.disabled = false;
          btnPause.disabled = true;
          doneOverlay.classList.add("visible");
          playDoneSound();
        }
      }

      function readInput() {
        const m = Math.max(0, parseInt(inputMin.value) || 0);
        const s = Math.max(0, Math.min(59, parseInt(inputSec.value) || 0));
        return m * 60 + s;
      }

      btnStart.addEventListener("click", () => {
        if (!running) {
          if (remaining === 0) {
            totalSeconds = readInput();
            remaining = totalSeconds;
            if (remaining <= 0) return;
          }
          // unlock audio on first gesture
          getAudioCtx().resume();

          running = true;
          statusEl.textContent = "計時中...";
          btnStart.disabled = true;
          btnPause.disabled = false;
          inputMin.disabled = true;
          inputSec.disabled = true;

          displayEl.textContent = fmt(remaining);
          setRing(remaining / totalSeconds);
          updateState();

          intervalId = setInterval(tick, 1000);
        }
      });

      btnPause.addEventListener("click", () => {
        if (running) {
          clearInterval(intervalId);
          running = false;
          statusEl.textContent = "已暫停";
          btnStart.disabled = false;
          btnPause.disabled = true;
        }
      });

      btnReset.addEventListener("click", () => {
        clearInterval(intervalId);
        running = false;
        remaining = 0;
        totalSeconds = 0;
        document.body.classList.remove(
          "state-warning",
          "state-danger",
          "state-critical",
        );
        displayEl.textContent = "00:00";
        displayEl.style.color = "";
        statusEl.textContent = "準備開始";
        setRing(1);
        ringEl.style.stroke = "";
        btnStart.disabled = false;
        btnPause.disabled = true;
        inputMin.disabled = false;
        inputSec.disabled = false;
        doneOverlay.classList.remove("visible");
      });

      btnDismiss.addEventListener("click", () => {
        doneOverlay.classList.remove("visible");
        btnReset.click();
      });

      // 快速預設
      document.querySelectorAll(".preset-btn").forEach((btn) => {
        btn.addEventListener("click", () => {
          if (running) return;
          inputMin.value = btn.dataset.min;
          inputSec.value = btn.dataset.sec;
          remaining = 0;
          totalSeconds = 0;
          displayEl.textContent = fmt(
            parseInt(btn.dataset.min) * 60 + parseInt(btn.dataset.sec),
          );
          setRing(1);
          document.body.classList.remove(
            "state-warning",
            "state-danger",
            "state-critical",
          );
          statusEl.textContent = "準備開始";
        });
      });

      // 輸入時即時預覽
      [inputMin, inputSec].forEach((el) => {
        el.addEventListener("input", () => {
          if (!running && remaining === 0) {
            displayEl.textContent = fmt(readInput());
            setRing(1);
          }
        });
      });

      // 初始顯示
      displayEl.textContent = fmt(readInput());
      setRing(1);
    </script>
  </body>
</html>
